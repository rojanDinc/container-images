name: Build Containers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      picoclaw: ${{ steps.filter.outputs.picoclaw }}
      paperclipai: ${{ steps.filter.outputs.paperclipai }}
      multica-opencode-runtime: ${{ steps.filter.outputs.multica-opencode-runtime }}
      # Add new containers here
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            picoclaw:
              - 'picoclaw/**'
            paperclipai:
              - 'paperclipai/**'
            multica-opencode-runtime:
              - 'multica-opencode-runtime/**'
            # Add new containers here:
            # othercontainer:
            #   - 'othercontainer/**'
            #   - '.github/workflows/build.yml'

  build-picoclaw:
    needs: changes
    if: ${{ needs.changes.outputs.picoclaw == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/picoclaw
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./picoclaw
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=picoclaw
          cache-to: type=gha,mode=max,scope=picoclaw
          outputs: type=docker,dest=/tmp/picoclaw.tar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-image
          path: /tmp/picoclaw.tar
          retention-days: 30

  build-paperclipai:
    needs: changes
    if: ${{ needs.changes.outputs.paperclipai == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/paperclipai
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./paperclipai
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=paperclipai
          cache-to: type=gha,mode=max,scope=paperclipai
          outputs: type=docker,dest=/tmp/paperclipai.tar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: paperclipai-image
          path: /tmp/paperclipai.tar
          retention-days: 30

  build-multica-opencode-runtime:
    needs: changes
    if: ${{ needs.changes.outputs.multica-opencode-runtime == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/multica-opencode-runtime
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./multica-opencode-runtime
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=multica-opencode-runtime
          cache-to: type=gha,mode=max,scope=multica-opencode-runtime
          outputs: type=docker,dest=/tmp/multica-opencode-runtime.tar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: multica-opencode-runtime-image
          path: /tmp/multica-opencode-runtime.tar
          retention-days: 30
